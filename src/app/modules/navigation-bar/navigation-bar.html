<div>
  <nav class="navigation-bar">
    <div class="nav-logo"><span class="logo-e">Whal</span><span class="logo-whale">-E</span></div>
    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a
        routerLink="/videos"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{exact: true}"
      >
        <mat-icon>video_library</mat-icon>
        <span>Videos</span>
      </a>
      <a
        routerLink="/contact"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{exact: true}"
      >
        <mat-icon>contact_support</mat-icon>
        <span>Contact</span>
      </a>
    </div>
    <div class="nav-user">
      @if (authService.currentUser$ | async; as user) {
      <span class="welcome-text">{{ user.username }}!</span>

      <button class="btn-profile" routerLink="/profile">My Videos</button>
      <button class="btn-logout" (click)="onLogout()">Logout</button>
      } @else {
      <button class="btn-login" routerLink="/login">Login</button>
      }
    </div>
  </nav>
</div>
