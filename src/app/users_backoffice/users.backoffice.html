<mat-table [dataSource]="dataSource">
  <!-- User id Definition -->
  <ng-container matColumnDef="id">
    <mat-header-cell *matHeaderCellDef> User id </mat-header-cell>
    <mat-cell *matCellDef="let row"> {{row.id}} </mat-cell>
  </ng-container>

  <!-- Username Definition -->
  <ng-container matColumnDef="username">
    <mat-header-cell *matHeaderCellDef> Username </mat-header-cell>
    <mat-cell *matCellDef="let row"> {{row.username}} </mat-cell>
  </ng-container>

  <!-- email Definition -->
  <ng-container matColumnDef="email">
    <mat-header-cell *matHeaderCellDef> User email </mat-header-cell>
    <mat-cell *matCellDef="let row"> {{row.email}} </mat-cell>
  </ng-container>

  <!-- role Definition -->
  <ng-container matColumnDef="role">
    <mat-header-cell *matHeaderCellDef> User role </mat-header-cell>
    <mat-cell *matCellDef="let row"> {{row.role.name}} </mat-cell>
  </ng-container>

  <!-- actions Definition -->
  <ng-container matColumnDef="actions">
    <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
    <mat-cell *matCellDef="let row"> 
        <mat-slide-toggle 
        [checked]="row.role.role_number === 1"
        (change)="onToggleChange($event, row)">Admin</mat-slide-toggle>
        <button (click)="deleteUser(row)">Delete</button>
    </mat-cell>
  </ng-container>

  <!-- Header and Row Declarations -->
  <mat-header-row *matHeaderRowDef="['id', 'username', 'email', 'role', 'actions']"></mat-header-row>
  <mat-row *matRowDef="let row; columns: ['id', 'username', 'email', 'role', 'actions']"></mat-row>
</mat-table>
