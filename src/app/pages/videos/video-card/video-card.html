<div class="video-card">
  <img [src]="videoData.thumbnailUrl" [alt]="videoData.name" class="thumb" />

  <div class="video-details">
    <div class="video-name">
      <p>{{ videoData.name }}</p>
    </div>
    <div class="video-author">
      <p>{{ videoData.author}}</p>
    </div>
    <div class="video-date">
      <p>{{ videoData.uploadDate | date:'mediumDate' }}</p>
    </div>
    <div class="video-description">
      <p [title]="videoData.description">
        {{ videoData.description | slice:0:100}}{{ videoData.description.length > 100 ? '...' : ''}}
      </p>
    </div>
  </div>
</div>
